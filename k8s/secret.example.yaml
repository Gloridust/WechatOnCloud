# 面板首个管理员账号 / 密码。
#
# 复制为 secret.yaml、改成你自己的强口令，并在部署前先创建：
#   kubectl apply -f k8s/secret.yaml
# 或者不用文件，直接命令创建：
#   kubectl -n wechat-on-cloud create secret generic woc-panel-admin \
#     --from-literal=username=admin --from-literal=password='你的强口令'
#
# 不创建本 Secret 时，deployment.yaml 里的 secretKeyRef 是 optional 的，面板会回退到默认
# admin / wechat 并在首次登录强制改密——务必尽快修改。本文件不在 kustomization 内，不会被
# `kubectl apply -k k8s` 自动应用，避免把口令提交进源码。
apiVersion: v1
kind: Secret
metadata:
  name: woc-panel-admin
  namespace: wechat-on-cloud
type: Opaque
stringData:
  username: admin
  password: "change-me-please"
